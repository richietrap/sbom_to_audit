schema_version: "0.2"
scenario:
  scenario_id: false_comfort
  title: "False Comfort"
  classification: controlled_fictional_scenario_real_format
  evaluation_status: pilot
  purpose: >-
    Test whether a valid supplier known_not_affected assertion is prevented from
    suppressing deployment-specific evidence when its declared product variant
    does not cover the active deployment.
  seeded_conflicts: 0
  expected_final_state: Report-Ready
  expected_final_authorized_state: Report

