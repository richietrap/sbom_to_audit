schema_version: "0.2"
scenario:
  scenario_id: ghost_logger
  title: "Silent Transitive / Ghost-Logger"
  classification: controlled_fictional_scenario_real_format
  evaluation_status: pilot
  purpose: >-
    Test real-format transitive-dependency ingestion, exact PURL identity resolution,
    public-feed-shaped vulnerability intelligence, a supplier known_not_affected
    assertion, contradictory local runtime evidence, scoped conflict resolution,
    human authorization, milestone satisfaction, and mitigation enrichment.
  seeded_conflicts: 1
  expected_final_state: Report-Ready
  expected_final_authorized_state: Report

