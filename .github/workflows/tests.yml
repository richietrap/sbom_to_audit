name: Regression suite

"on":
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Compile package
        run: python -m compileall -q src tests scripts

      - name: Run regression suite
        run: python -m pytest

      - name: Run deterministic CLI smoke tests
        run: |
          for scenario in data/scenarios/*.yaml; do
            name="$(basename "$scenario" .yaml)"
            first="${RUNNER_TEMP}/${name}-first"
            second="${RUNNER_TEMP}/${name}-second"
            python -m sbom_to_audit.cli \
              --scenario "$scenario" \
              --output-root "$first"
            python -m sbom_to_audit.cli \
              --scenario "$scenario" \
              --output-root "$second"
            diff -ru "$first" "$second"
          done

      - name: Run deterministic Stage 6 baseline comparison
        run: |
          first="${RUNNER_TEMP}/stage6-baseline-first"
          second="${RUNNER_TEMP}/stage6-baseline-second"
          python scripts/run_baseline_comparison.py --output-root "$first"
          python scripts/run_baseline_comparison.py --output-root "$second"
          diff -ru "$first" "$second"
