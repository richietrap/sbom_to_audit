name: Regression suite

"on":
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Compile package
        run: python -m compileall -q src tests scripts

      - name: Run regression suite
        run: python -m pytest

      - name: Run deterministic CLI smoke test
        run: |
          first="${RUNNER_TEMP}/sbom-to-audit-first"
          second="${RUNNER_TEMP}/sbom-to-audit-second"
          python -m sbom_to_audit.cli \
            --scenario data/scenarios/ghost_logger.yaml \
            --output-root "$first"
          python -m sbom_to_audit.cli \
            --scenario data/scenarios/ghost_logger.yaml \
            --output-root "$second"
          diff -ru "$first" "$second"
