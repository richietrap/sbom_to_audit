name: Quality gates

"on":
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Install actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Lint GitHub Actions workflows
        run: actionlint

      - name: Run static quality checks
        run: |
          ruff check .
          ruff format --check .
          python -m mypy src
          codespell
          yamllint .github data .pre-commit-config.yaml .yamllint.yml

      - name: Validate repository integrity
        run: python scripts/validate_repository.py

      - name: Run tests with branch coverage
        run: |
          python -m pytest \
            --cov=sbom_to_audit \
            --cov-branch \
            --cov-report=term-missing
