name: Quality gates

"on":
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Install actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Lint GitHub Actions workflows
        run: actionlint

      - name: Run static quality checks
        run: |
          ruff check .
          ruff format --check .
          python -m mypy src
          codespell
          yamllint \
            .github data evaluation/baseline_protocol_v0.1.yaml \
            .pre-commit-config.yaml .yamllint.yml

      - name: Verify historical EPSS against authoritative sources
        run: |
          python scripts/verify_historical_epss.py \
            --online \
            --output-dir "$RUNNER_TEMP/historical-epss" \
            --report "$RUNNER_TEMP/historical-epss/report.json"

      - name: Validate verified historical replay eligibility
        run: |
          python scripts/run_historical_replay.py \
            --output-root "$RUNNER_TEMP/historical-replay-verified" \
            --epss-verification-report "$RUNNER_TEMP/historical-epss/report.json"
          bundle_dir="$RUNNER_TEMP/historical-replay-verified/historical_public"
          python scripts/assert_verified_historical_replay.py \
            "$bundle_dir/cve_2024_3400_public_bundle.json"

      - name: Validate repository integrity
        run: python scripts/validate_repository.py --strict-sources

      - name: Run tests with branch coverage
        run: |
          python -m pytest \
            --cov=sbom_to_audit \
            --cov-branch \
            --cov-report=term-missing
